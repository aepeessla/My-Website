<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Punktefeld</title>
    <style>
    body {
        background-image: url("https://i.pinimg.com/736x/10/e8/5a/10e85aa22d9aaa771f99d0b20d9bba10.jpg");
        background-size: cover;
        background-position: center;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        overflow: hidden;
    }

    /* Namen-Eingabe oben links fixieren */
    .input-bereich {
        position: absolute;
        top: 20px;
        left: 20px;
        display: flex;
        flex-direction: column;
        gap: 5px;
        z-index: 100;
    }

    .nameneintrag {
        font-family: "Arial";
        /* Glasoptik dunkel */
        background: rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 5px;
        padding: 8px;
        color: white; /* Weiße Schrift */
        outline: none;
    }

    label {
        font-family: "Arial";
        color: white;
        font-size: 14px;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }

    .scoreboard {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 30px;

        display: grid;
        /* 1fr links, auto für die Mitte, 1fr rechts = Symmetrie! */
        grid-template-columns: 1fr auto 1fr; 
        align-items: center; 
        
        width: 95%;
        max-width: 1000px;
        padding: 100px 40px; /* Mehr Platz oben/unten, weniger an den Seiten */
        box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }

    .doppelpunkt {
        font-size: 100px; /* Etwas kleiner als die Scores für bessere Optik */
        color: white;
        font-family: "Arial";
        display: flex;
        justify-content: center;
        align-items: center;
        width: 60px; /* Feste Breite für den mittleren Bereich */
    }

    .score {
        font-family: "Arial";
        font-weight: bold;
        /* Riesige Zahlen mit Glass-Effekt durch Text-Shadow */
        font-size: 200px; 
        color: white;
        text-shadow: 0 0 20px rgba(255,255,255,0.4);
        margin: 0;
        line-height: 1;
        text-align: center;
        min-width: 150px;
    }

    .doppelpunkt {
        font-size: 120px;
        color: white;
        font-family: "Arial";
        padding: 0 20px;
    }

    .scoreboard_name {
        font-family: "Arial";
        color: white;
        display: block;
        margin-bottom: 15px;
        letter-spacing: 2px;
        text-transform: uppercase;
        font-size: 14px;
        text-align: center;
        min-width: 150px;
    }

    .scorebutton {
        background: rgba(255, 255, 255, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 10px;
        color: white;
        width: 40px;
        height: 40px;
        cursor: pointer;
        font-size: 20px;
        transition: 0.3s;
        text-align: center;
        min-width: 150px;
    }

    .scorebutton:hover {
        background: rgba(255, 255, 255, 0.5);
    }
</style>
</head>

<body>

<div class="input-bereich">
    <div>
        <label for="input-t1">Name 1</label><br>
        <input id="input-t1" class="nameneintrag">
    </div>
    <div>
        <label for="input-t2">Name 2</label><br>
        <input id="input-t2" class="nameneintrag">
    </div>
</div>

<div class="scoreboard">
    <div>
        <span id="T1-name" class="scoreboard_name">TEAM 1</span>
        <p class="score" id="score1">0</p>
        <button id="Team1+1" class="scorebutton">+</button>
        <button id="Team1-1" class="scorebutton">-</button>
    </div>

    <div class="doppelpunkt">:</div>

    <div>
        <span id="T2-name" class="scoreboard_name">TEAM 2</span>
        <p class="score" id="score2">0</p>
        <button id="Team2+1" class="scorebutton">+</button>
        <button id="Team2-1" class="scorebutton">-</button>
    </div>
</div>
    

<script>
// Logik Team 1
let score1 = 0;
const btn_t1_inkrementieren = document.getElementById("Team1+1");
const btn_t1_dekrementieren = document.getElementById("Team1-1");
const anzeige1 = document.getElementById("score1");


function team1Inkrementieren(){
    score1 += 1
    anzeige1.textContent = score1;
}

function team1Dekrementieren(){
    if (score1 > 0) {
        score1 -= 1
        anzeige1.textContent = score1;
    }
}

btn_t1_inkrementieren.addEventListener("click", team1Inkrementieren);
btn_t1_dekrementieren.addEventListener("click", team1Dekrementieren);

// Logik Team 2
let score2 = 0;
const btn_t2_inkrementieren = document.getElementById("Team2+1");
const btn_t2_dekrementieren = document.getElementById("Team2-1");
const anzeige2 = document.getElementById("score2");


function team2Inkrementieren(){
    score2 += 1
    anzeige2.textContent = score2;
}

function team2Dekrementieren(){
    if (score2 > 0) {
        score2 -= 1
        anzeige2.textContent = score2;
    }
}

btn_t2_inkrementieren.addEventListener("click", team2Inkrementieren);
btn_t2_dekrementieren.addEventListener("click", team2Dekrementieren);

//Namen anzeigen lassen
//Logik Team 1
const name_t1 = document.getElementById("input-t1")
const name1 = document.getElementById("T1-name")



name_t1.addEventListener("keypress", function setName1(event1){
    if (event1.key === "Enter"){
        name1.textContent = name_t1.value;
        name_t1.value = ""
    }
    
})


//Logik Team 2
const name_t2 = document.getElementById("input-t2")
const name2 = document.getElementById("T2-name")

name_t2.addEventListener("keypress", function setName1(event2){
    if (event2.key === "Enter"){
        name2.textContent = name_t2.value;
        name_t2.value = "";
    }
    
})


</script>

</body>
</html>
