<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&display=swap" rel="stylesheet">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commission form</title>
    <style>
        .instrument-serif-regular {
            font-family: "Instrument Serif", serif;
            font-weight: 400;
            font-style: normal;
        }
        .header1 {
            font-family: "Yeseva One";
            text-decoration: underline;
            font-weight: bold;
            font-size: 20px;
            color: white;
        }
        body {
            background-image: url('/Users/efeaksoy/Documents/GitHub/Commision website/Background1.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: scroll; /* Bild bewegt sich mit der Seite mit */
        }
        /*Ich definiere eine Box*/
        .infoBox{
            background-image: linear-gradient(to right, aliceblue, transparent);
            padding: 5px 15px;
            border-radius: 9px; /*Hier runden wir die Ecken ab*/
            width: auto; /*D. macht d. Box so breit wie d. Inhalt*/
        }
        .infoBoxText{
            font-family: "Instrument Serif", serif;
            font-weight: 400;
            font-style: italic;

            /* Ein Verlauf von Schwarz zu Transparent */
            background: linear-gradient(to left, black, rgb(174, 174, 174));
            
            /* Diese beiden Zeilen sind die Magie: */
            -webkit-background-clip: text; /* Schneidet den Hintergrund auf die Textform zu */
            -webkit-text-fill-color: transparent; /* Macht die eigentliche Textfarbe unsichtbar */
            
            font-size: 15px;
        }
        

    </style>
</head>
<body>


<div style="display: flex; justify-content: center; align-items: center">
    <img src='/Users/efeaksoy/Documents/GitHub/Commision website/Unbenanntes_Projekt.png' width="300" height="auto" >
</div>

<div class="infoBox">
    <h3 class="header1">What am I drawing ?</h3>
    <ul class="infoBoxText">
        <li>family members</li>
        <li>friends</li>
        <li>animals</li>
        <li>celebrities</li>
        <li>male/female characters</li>
        <li>I can draw someone's face into an reference</li>
        <li>outfit designs</li>
        <li>fanart</li>
        <li>OGs</li>
    </ul>
</div>


</body>
</html>
